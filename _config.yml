title: 个人博客
subtitle: Big Data Infrastructure Engineer
description: SparkSQL 引擎优化、分布式系统、数据库内核与性能工程笔记。
keywords: SparkSQL, SQL Engine, Distributed Systems, Database, Performance Engineering
author: Shawn
language: zh-CN
timezone: Asia/Shanghai

url: https://xinshuowang.github.io
root: /
permalink: :title/
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""

filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

theme: shawn

index_generator:
  path: ""
  per_page: 12
  order_by: -date

archive_generator:
  per_page: 24
  yearly: true
  monthly: false
  daily: false

tag_generator:
  per_page: 24

marked:
  prependRoot: true
  postAsset: false
  lazyload: false
  gfm: true

highlight:
  enable: true
  line_number: false
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false

prismjs:
  enable: false
